ams:
  admin-username: admin
  admin-password: password
  server-bind-host: "0.0.0.0"
  server-expose-host: "127.0.0.1"

  thrift-server:
    max-message-size: 100MB # 104857600
    selector-thread-count: 2
    selector-queue-size: 4
    table-service:
      bind-port: 1260
      worker-thread-count: 20
    optimizing-service:
      bind-port: 1261

  http-server:
    session-timeout: 7d
    bind-port: 1630
    rest-auth-type: token

  refresh-external-catalogs:
    interval: 3min # 180000
    thread-count: 10
    queue-size: 1000000

  refresh-tables:
    thread-count: 10
    interval: 1min # 60000
    max-pending-partition-count: 100 # default 100

  self-optimizing:
    commit-thread-count: 10
    runtime-data-keep-days: 30
    runtime-data-expire-interval-hours: 1
    refresh-group-interval: 30s

  optimizer:
    heart-beat-timeout: 1min # 60000
    task-ack-timeout: 30s # 30000
    task-execute-timeout: 1h # 3600000
    polling-timeout: 3s # 3000
    max-planning-parallelism: 1 # default 1

  blocker:
    timeout: 1min # 60000

  # optional features
  expire-snapshots:
    enabled: true
    thread-count: 10

  clean-orphan-files:
    enabled: true
    thread-count: 10
    interval: 1d

  clean-dangling-delete-files:
    enabled: true
    thread-count: 10

  sync-hive-tables:
    enabled: false
    thread-count: 10

  data-expiration:
    enabled: true
    thread-count: 10
    interval: 1d

  auto-create-tags:
    enabled: true
    thread-count: 3
    interval: 1min # 60000

  table-manifest-io:
    thread-count: 20

  catalog-meta-cache:
    expiration-interval: 60s

  # Support for encrypted sensitive configuration items
  shade:
    identifier: default # Built-in support for default/base64. Defaults to "default", indicating no encryption
    sensitive-keywords: admin-password;database.password

  overview-cache:
    refresh-interval: 3min          # 3 min
    max-size: 3360                # Keep 7 days history by default, 7 * 24 * 60 / 3 = 3360

  # PostgreSQL
  database:
    type: postgres
    jdbc-driver-class: org.postgresql.Driver
    url: jdbc:postgresql://postgresql:5432/fusion
    username: temporal
    password: temporal
    connection-pool-max-total: 20
    connection-pool-max-idle: 16
    connection-pool-max-wait-millis: 30000
    auto-create-tables: true

  terminal:
    backend: local
    result:
      limit: 1000
    stop-on-error: false
    session:
      timeout: 30min # 1800000
    local:
      using-session-catalog-for-hive: false
      spark.sql.iceberg.handle-timestamp-without-timezone: false
      spark.sql.codegen.wholeStage: false

containers:
  - name: sparkContainer
    container-impl: org.apache.amoro.server.manager.SparkOptimizerContainer
    properties:
      ams-optimizing-uri: "thrift://fusion.olake.internal:1261"
      spark-home: /opt/spark/
      # Kind control-plane hostname — resolved via Docker DNS (iceberg-net)
      master: k8s://https://fusion-cluster-control-plane:6443
      deploy-mode: cluster
      job-uri: "local:///opt/spark/usrlib/optimizer-job.jar"
      export.HADOOP_USER_NAME: spark
      export.SPARK_CONF_DIR: /opt/spark/conf/
      spark-conf.spark.kubernetes.container.image: "olakego/fusion-spark:v0.1.0"
      spark-conf.spark.kubernetes.container.image.pullPolicy: "IfNotPresent"
      spark-conf.spark.kubernetes.namespace: spark
      spark-conf.spark.kubernetes.authenticate.driver.serviceAccountName: spark
      spark-conf.spark.kubernetes.authenticate.executor.serviceAccountName: spark
      spark-conf.spark.dynamicAllocation.enabled: "true"
      spark-conf.spark.shuffle.service.enabled: "false"
      spark-conf.spark.dynamicAllocation.shuffleTracking.enabled: "true"
      spark-conf.spark.driver.memory: "1g"
      spark-conf.spark.executor.memory: "1g"
      spark-conf.spark.executor.cores: "1"
      # Configs to prevent spark context from getting failed on executor failures
      # Number of retries by spark = spark-conf.spark.task.maxFailures - 1
      spark-conf.spark.executor.maxNumFailures: "100"
      spark-conf.spark.executor.failuresValidityInterval: "60s"
      spark-conf.spark.task.maxFailures: "4"
      # Mount shared log volume so driver/executor pods write logs to the same path
      # that LogController reads from (via the Kind node hostPath extraMount).
      spark-conf.spark.kubernetes.driver.volumes.hostPath.amoro-logs.mount.path: "/mnt/amoro-logs"
      spark-conf.spark.kubernetes.driver.volumes.hostPath.amoro-logs.mount.readOnly: "false"
      spark-conf.spark.kubernetes.driver.volumes.hostPath.amoro-logs.options.path: "/mnt/amoro-logs"
      spark-conf.spark.kubernetes.executor.volumes.hostPath.amoro-logs.mount.path: "/mnt/amoro-logs"
      spark-conf.spark.kubernetes.executor.volumes.hostPath.amoro-logs.mount.readOnly: "false"
      spark-conf.spark.kubernetes.executor.volumes.hostPath.amoro-logs.options.path: "/mnt/amoro-logs"
      # Force Log4j2 to use the routing config (belt-and-suspenders with the Dockerfile COPY)
      spark-conf.spark.driver.extraJavaOptions: "-Dlog4j2.configurationFile=file:///opt/spark/conf/log4j2.xml"
      spark-conf.spark.executor.extraJavaOptions: "-Dlog4j2.configurationFile=file:///opt/spark/conf/log4j2.xml"

name: Go Security CI
on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "*"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"


jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version-file: "server/go.mod"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run vulnerability checks
        working-directory: ./server
        run: |
          # Custom Wrapper Script to supress the vulnerabilities that are in the .govulnignore file.
          govulncheck -json ./... > /tmp/govuln.json 2>/tmp/govuln.err || VULN_EXIT=$?
          VULN_EXIT=${VULN_EXIT:-0}

          if [ "$VULN_EXIT" -ne 3 ]; then
            exit "$VULN_EXIT"
          fi

          # Vulnerabilities found — pass if all are in .govulnignore, fail otherwise.
          IGNORED=$(grep -oE 'GO-[0-9]+-[0-9]+' ../.govulnignore 2>/dev/null | sort -u | paste -sd'|')
          UNKNOWN=$(jq -r 'select(.finding != null) | .finding.osv' /tmp/govuln.json | sort -u)
          [ -n "$IGNORED" ] && UNKNOWN=$(echo "$UNKNOWN" | grep -vxE "$IGNORED" || true)

          if [ -n "$UNKNOWN" ]; then
            jq -r 'select(.message != null) | .message.text // empty' /tmp/govuln.json
            echo "Unsuppressed vulnerabilities found: $UNKNOWN"
            exit 1
          fi

          echo "govulncheck: all findings suppressed via .govulnignore"

  gosec:
    name: GoSec Security Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version-file: "server/go.mod"
      - name: install gosec
        run: curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.22.11
      - name: Run Gosec Security Scanner
        working-directory: ./server
        run: $(go env GOPATH)/bin/gosec -exclude=G115 -severity=high -confidence=medium ./...

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          exit-code: '1'
          scan-type: 'fs'
          scan-ref: './'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
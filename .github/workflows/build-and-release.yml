name: Olake UI Build And Release
on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to build (master, staging, dev)"
        required: true
        default: ""
        type: string
      ref:
        description: "Git ref (branch/tag/SHA) to build from. If empty, derived from environment mapping."
        required: false
        default: ""
        type: string
      version:
        description: "Version to release"
        required: true
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to build (master, staging, dev)"
        required: true
        default: "dev"
        type: choice
        options:
          - master
          - staging
          - dev
      ref:
        description: "Git ref (branch/tag/SHA) to build from (optional). If empty, derived from environment mapping."
        required: false
        default: ""
        type: string
      version:
        description: "Version to release"
        required: true
        default: "v0.0.0.dev"
        type: string

jobs:
  build_and_publish_frontend:
    name: Build and publish frontend image for ${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    env:
      DOCKER_LOGIN: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKER_REPO: ${{ secrets.DOCKER_REPO || 'olakego' }}
      DOCKER_REPO_WORKER: ${{ secrets.DOCKER_REPO_WORKER || 'olakego' }}
      ENVIRONMENT: ${{ inputs.environment }}
      VERSION: ${{ inputs.version }}

    steps:
      - name: Checkout code from explicit ref
        if: ${{ inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Checkout code for master
        if: ${{ inputs.ref == '' && inputs.environment == 'master' }}
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Checkout code for staging
        if: ${{ inputs.ref == '' && inputs.environment == 'staging' }}
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Checkout code for dev
        if: ${{ inputs.ref == '' && inputs.environment == 'dev' }}
        uses: actions/checkout@v4
        with:
          ref: ci/workerReleaseIssues

      - name: Checkout code for other environments
        if: ${{ inputs.ref == '' && inputs.environment != 'master' && inputs.environment != 'staging' && inputs.environment != 'dev' }}
        uses: actions/checkout@v4
        with:
          ref: staging

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('ui/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup environment variables
        run: |
          echo "ENVIRONMENT=${{ env.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "VERSION=${{ env.VERSION }}" >> $GITHUB_ENV
          echo "Building frontend application for $ENVIRONMENT with version $VERSION"

      - name: Run Release tool
        run: |
          chmod +x ./release.sh
          ./release.sh
        shell: bash
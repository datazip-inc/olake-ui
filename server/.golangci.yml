linters-settings:
  depguard:
    list-type: blacklist
    packages:
    # logging is allowed only by logutils.Log, logrus
    # is allowed to use only in logutils package
    - github.com/sirupsen/logrus
    packages-with-error-message:
    - github.com/sirupsen/logrus: "logging is allowed only by beego logger"
  dupl:
    threshold: 100
  exhaustive:
    default-signifies-exhaustive: false
  funlen:
    lines: 100
    statements: 50
  gci:
    sections:
    - standard
    - default
    - prefix(github.com/golangci/golangci-lint)
  goconst:
    min-len: 2
    min-occurrences: 2
  gocritic:
    enabled-tags:
    - diagnostic
    - experimental
    - opinionated
    - performance
    - style
    disabled-checks:
    - dupImport # https://github.com/go-critic/go-critic/issues/845
    - ifElseChain
    - octalLiteral
    - whyNoLint
    - wrapperFunc
    # Removed checks below are not supported by recent go-critic versions.
    # Keeping behavior as close as possible without breaking config parsing.
    # - unnamedResult
    # - importShadow
    # - returnAfterHttpError
    # - preferDecodeRune
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes: github.com/golangci/golangci-lint
  # golint:
  #   min-confidence: 0
  # gomnd:
  #   settings:
  #     mnd:
  #       checks:
  #         - argument
  #         - case
  #         - condition
  #         - return
  gosec:
    excludes:
    - G204
  govet:
    settings:
      printf:
        funcs:
        - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
        - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
        - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
        - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
  lll:
    line-length: 950
  # maligned:
  #   suggest-new: true
  misspell:
    locale: US
    ignore-words:
    - eles
  nolintlint:
    allow-unused: false
    require-explanation: false
    require-specific: false

linters:
  # please, do not use `enable-all`: it's deprecated and will be removed soon.
  # inverted configuration with `enable-all` and `disable` is not scalable during updates of golangci-lint
  disable-all: true
  enable:
  - bodyclose
  # - dupl
  # - deadcode
  - dogsled
  - errcheck
  # - exhaustive
  # - funlen
  # - goconst
  - gocritic
  # - gocyclo
  - gofmt
  - goimports
  - revive
  # - gosec
  # - gomnd
  # - goprintffuncname
  - gosimple
  - govet
  - ineffassign
  # - interfacer
  - lll
  # - misspell
  # - nakedret
  # - nolintlint
  # - rowserrcheck
  # - scopelint
  - staticcheck
  # - structcheck
  - stylecheck
  - typecheck
  # - unconvert
  # - unparam
  - unused
  # - varcheck
  - whitespace
  - nilnil
  - nilerr

issues:
  exclude-rules:
  - path: _test\.go
    linters:
    - gomnd

  # https://github.com/go-critic/go-critic/issues/926
  - linters:
    - gocritic
    text: "unnecessaryDefer:"
  exclude-dirs:
  - test/testdata_etc
  - internal/cache
  - internal/renameio
  - internal/robustio

run:
  timeout: 5m

APP_NAME: olake-server
HTTP_PORT: "8000"
HTTP_READ_HEADER_TIMEOUT: "10s"
HTTP_READ_TIMEOUT: "600s"
HTTP_WRITE_TIMEOUT: "600s"
HTTP_IDLE_TIMEOUT: "600s"
# RUN_MODE is auto-detected: "dev" for Docker, "staging" for Kubernetes (via KUBERNETES_SERVICE_HOST).
# Override explicitly via RUN_MODE env var or uncomment below if needed.
# RUN_MODE: dev

MAX_MEMORY: 67108864
MAX_UPLOAD_SIZE: 67108864

# Either provide a full DSN here...
POSTGRES_DB: ""
# ...or configure via individual parts below.
OLAKE_POSTGRES_USER: temporal
OLAKE_POSTGRES_PASSWORD: temporal
OLAKE_POSTGRES_HOST: postgresql
OLAKE_POSTGRES_PORT: "5432"
OLAKE_POSTGRES_DBNAME: postgres
OLAKE_POSTGRES_SSLMODE: disable

LOGS_DIR: ./logger/logs
SESSION_ON: true

TEMPORAL_ADDRESS: temporal:7233
TEMPORAL_NAMESPACE: default
TEMPORAL_ENABLE_TLS: false
TEMPORAL_API_KEY: ""
TEMPORAL_EXTERNAL: false
TEMPORAL_TASK_QUEUE: ""
CONTAINER_REGISTRY_BASE: registry-1.docker.io

# Set to false in Fusion-only or air-gapped deployments to disable upstream
# container registry queries (Docker Hub / ECR / GCR) for connector version
# discovery. When false, /versions and /spec return DEFAULT_CONNECTOR_VERSION
# instead of polling the registry.
CONNECTOR_DISCOVERY_ENABLED: true

# Fallback connector version used when CONNECTOR_DISCOVERY_ENABLED is false.
# Ignored when discovery is enabled. Example: "v0.3.18".
DEFAULT_CONNECTOR_VERSION: ""

# Prefer setting this via environment.
OLAKE_SECRET_KEY: ""

# Optimization module configuration
ENABLE_OPTIMIZATION: false
OPTIMIZATION_BASE_URL: http://127.0.0.1:1630
OPTIMIZATION_GROUP: spark-container
